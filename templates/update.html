{% extends 'base.html' %}
{% block title %}Update Todo{% endblock title %}
{% block body %}
<div class="container my-3">
  <h2>Update Todo</h2>
  <form action="/update/{{todo.sno}}" method="POST" class="row g-3">
    <div class="col-md-4">
      <label for="title" class="form-label">Todo Title</label>
      <input type="text" class="form-control" name="title" id="title" value="{{todo.title}}" required>
    </div>
    <div class="col-md-4">
      <label for="desc" class="form-label">Todo Description</label>
      <input type="text" class="form-control" name="desc" id="desc" value="{{todo.desc}}" required>
    </div>
    <div class="col-md-2">
      <label for="due_date" class="form-label">Due Date</label>
      <input type="date" class="form-control" name="due_date" id="due_date" value="{% if todo.due_date %}{{ todo.due_date.strftime('%Y-%m-%d') }}{% endif %}">
    </div>
    <div class="col-md-2">
      <label for="category" class="form-label">Category</label>
      <select class="form-select" name="category" id="category">
        <option value="">Select</option>
        <option value="Work" {% if todo.category=='Work' %}selected{% endif %}>Work</option>
        <option value="Personal" {% if todo.category=='Personal' %}selected{% endif %}>Personal</option>
        <option value="Urgent" {% if todo.category=='Urgent' %}selected{% endif %}>Urgent</option>
        <option value="Other" {% if todo.category=='Other' %}selected{% endif %}>Other</option>
      </select>
    </div>
    <div class="col-md-2">
      <label for="priority" class="form-label">Priority</label>
      <select class="form-select" name="priority" id="priority">
        <option value="High" {% if todo.priority=='High' %}selected{% endif %}>High</option>
        <option value="Medium" {% if todo.priority=='Medium' %}selected{% endif %}>Medium</option>
        <option value="Low" {% if todo.priority=='Low' %}selected{% endif %}>Low</option>
      </select>
    </div>
    <div class="col-md-2 d-flex align-items-end">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" name="completed" id="completed" {% if todo.completed %}checked{% endif %}>
        <label class="form-check-label" for="completed">Completed</label>
      </div>
    </div>
    <div class="col-md-2 d-flex align-items-end">
      <button type="submit" class="btn btn-dark w-100">Update</button>
    </div>
  </form>
</div>
{% endblock body %}
